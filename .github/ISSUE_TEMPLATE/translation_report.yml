name: Translation report
description: Report a wrong, missing, or awkward translation
title: "[i18n]: "
labels: [i18n]
body:
  - type: dropdown
    id: locale
    attributes:
      label: Language
      options:
        - Português (pt)
        - Español (es)
        - Deutsch (de)
        - 日本語 (ja)
        - 中文 (zh)
        - Other / new language request
    validations:
      required: true
  - type: input
    id: key
    attributes:
      label: Translation key or location
      description: The i18n key (e.g. "nav.library") or where in the UI you saw the text.
      placeholder: e.g. common.newProject
  - type: textarea
    id: current
    attributes:
      label: Current text
      description: What the app shows now.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested text
      description: What it should say instead, and why (optional).
    validations:
      required: true
