name: Feature request
description: Suggest an idea for laser-gen
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point — not just the solution you imagine.
      placeholder: When engraving tumblers I often need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like laser-gen to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you use today.
  - type: checkboxes
    id: roadmap-check
    attributes:
      label: Roadmap check
      options:
        - label: I checked ROADMAP.md and this is not already planned (or I want to discuss an existing item)
