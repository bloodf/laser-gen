name: Stale

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no
            activity for 60 days. It will be closed in 14 days if there is no further
            activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days if there is no further
            activity.
          close-issue-message: "Closed due to inactivity. Feel free to reopen if still relevant."
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,roadmap
          exempt-pr-labels: pinned,security
