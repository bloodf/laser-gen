version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
      tooling:
        patterns:
          - "eslint*"
          - "typescript"
          - "vitest"
          - "vue-tsc"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
